name: CI

on:
  workflow_dispatch:
  pull_request:
    paths: &ci_paths
      - "Justfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".cargo/**"
      - "flake.nix"
      - "flake.lock"
      - "package.nix"
      - "test/**"
      - ".github/workflows/ci.yaml"
  push:
    branches-ignore:
      - "update-*"
    paths: *ci_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check formatting & lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          github_access_token: ${{ github.token }}

      - name: Checking Code (format, lints, etc.)
        run: |
          eval "$(nix print-dev-env)"
          just check

  build-linux:
    name: Build NH on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          github_access_token: ${{ github.token }}

      - name: Build NH with Nix
        run: nix build -L --no-link

  build-darwin:
    name: Build NH on Darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          github_access_token: ${{ github.token }}

      - name: Build NH with Nix
        run: nix build -L --no-link

  test-linux:
    name: Test NH on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          github_access_token: ${{ github.token }}
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Tests
        run: |
          set -x

          # Verify that tests pass
          nix develop --command cargo test

      - name: Test Switching to NixOS Configuration
        run: |
          nix run .#nh -- os switch --diff never --dry --no-nom --verbose --file ./test/nixos.nix

  test-darwin:
    name: Test NH on Darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          github_access_token: ${{ github.token }}

      - name: Run Tests
        run: |
          set -x

          # Verify that tests pass
          nix develop --command cargo test

      - name: Test Switching to Nix Darwin Configuration
        run: |
          mkdir flake
          cd flake
          nix flake init -t nix-darwin
          git add flake.nix
          cd ..
          nix run .#nh -- darwin switch --diff never --hostname simple --dry --no-nom --verbose ./flake

  required-checks-passed:
    name: All required jobs passed
    runs-on: ubuntu-latest
    needs:
      - check
      - build-linux
      - build-darwin
      - test-linux
      - test-darwin
    if: always()
    steps:
      - name: Check required jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more required jobs failed, were cancelled, or were skipped."
          exit 1

      - name: Mark required jobs passed
        run: echo "All required jobs passed."
